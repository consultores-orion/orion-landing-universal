                document.getElementById('main-content').innerHTML = `<div class="container mx-auto text-center p-8 mt-10"><div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative" role="alert"><strong class="font-bold text-xl block">¡Error de Configuración!</strong><p class="block sm:inline mt-2">Por favor, actualiza las variables <strong>SUPABASE_URL</strong> y <strong>SUPABASE_ANON_KEY</strong> en el código de <code>index.html</code>.</p></div></div>`;
                return false;
            }
            return true;
        }

        function renderNavLinks(data) {
            const navLinksContainer = document.getElementById('nav-links');
            navLinksContainer.innerHTML = '';
            data.forEach(module => {
                if (module.is_visible && navLinkTitles[module.section_key]) {
                    const link = document.createElement('a');
                    link.href = `#${module.section_key}`;
                    link.textContent = navLinkTitles[module.section_key][currentLang] || navLinkTitles[module.section_key]['es'];
                    link.className = 'hover:text-[#F7DE88] transition-colors';
                    navLinksContainer.appendChild(link);
                }
            });
        }
        
        function renderLogo(module) {
            const logoContainer = document.getElementById('logo-container');
            logoContainer.innerHTML = ''; // Limpiar
            if (!module) return;

            const content = module.content;
            const moduleId = module.id;

            // Contenedor para la imagen del logo
            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'relative image-upload-container h-14 w-14 rounded-full bg-gray-800 flex items-center justify-center';
            
            if (content.logo_image_url) {

        async function fetchAndRenderPage() {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `<div id="loader" class="flex justify-center items-center h-screen"><div class="loader"></div></div>`;
            try {
                const { data, error } = await supabase.from('page_content').select('*').order('display_order', { ascending: true });
                if (error) {
                    // Specific error handling for failed fetch
                    if (error.message.toLowerCase().includes('failed to fetch')) {
                        throw new Error('NetworkError');
                    }
                    throw error;
                }
                
                allContent = data;
                renderLogo(data.find(m => m.section_key === 'navbar'));
                renderNavLinks(data);

                mainContent.innerHTML = '';
                data.forEach(module => {
                    if (module.is_visible && module.section_key !== 'navbar') {
                        const moduleElement = renderModule(module);
                        if (moduleElement) mainContent.appendChild(moduleElement);
                    }
                });
                
                // Inicializar carruseles después de renderizar el contenido
                new Swiper('.testimonials-carousel', {
                    loop: true,
                    slidesPerView: 1,
                    spaceBetween: 30,
                     breakpoints: {
                        768: {
                          slidesPerView: 2,
                          spaceBetween: 40
                        }
                    },
                    navigation: {
                        nextEl: '.swiper-button-next',
                        prevEl: '.swiper-button-prev',
                    },
                    pagination: {
                        el: '.swiper-pagination',
                        clickable: true,
                    },
                });

            } catch (error) {
                console.error('Error fetching page content:', error);
                let userMessage = `<p class="text-center text-red-500 p-8">Error al cargar el contenido. Revisa la consola para más detalles.</p>`;
                if (error.message === 'NetworkError') {
                    userMessage = `
                        <div class="container mx-auto text-center p-8 mt-10">
                            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative" role="alert">
                                <strong class="font-bold text-xl block">¡Error de Conexión!</strong>
                                <p class="block sm:inline mt-2">
                                    No se pudo conectar con la base de datos de Supabase.
                                </p>
                                 <p class="mt-4 text-sm text-gray-600">
                                    Por favor, verifica que la URL de Supabase sea correcta y que tu conexión a internet esté activa.
                                </p>
                            </div>
                        </div>
                    `;
                }
                mainContent.innerHTML = userMessage;
            }
        }

        function setElementsEditable(isEditable) {
            document.querySelectorAll('[data-editable]').forEach(el => { el.contentEditable = isEditable; });
            const addLogoBtn = document.querySelector('#logo-container .change-image-btn');
            if(addLogoBtn) {
                 const logoModule = allContent.find(m => m.section_key === 'navbar');
                 if(logoModule && !logoModule.content.logo_image_url) {
                    addLogoBtn.classList.toggle('hidden', !isEditable);
                 }
            }
        }

        // ===== LÓGICA DE EVENTOS =====
        document.getElementById('lang-switcher').addEventListener('click', (e) => {
            if (e.target.classList.contains('lang-btn')) {
                currentLang = e.target.dataset.lang;
                document.querySelectorAll('.lang-btn').forEach(btn => {
                    const isCurrent = btn.dataset.lang === currentLang;
                    btn.classList.toggle('gold-gradient', isCurrent);
                    btn.classList.toggle('text-[#1A1A1A]', isCurrent);
                    btn.classList.toggle('font-bold', isCurrent);
                    btn.classList.toggle('bg-gray-700', !isCurrent);
                    btn.classList.toggle('text-gray-300', !isCurrent);
                });
                fetchAndRenderPage().then(() => setElementsEditable(isAdminMode));
            }
        });
        
        document.getElementById('main-content').addEventListener('click', function(e) {
            const questionBtn = e.target.closest('.faq-question');
            if (questionBtn) {
                const answer = questionBtn.nextElementSibling;
                const icon = questionBtn.querySelector('svg');
                answer.classList.toggle('hidden');
                icon.classList.toggle('rotate-180');
            }
        });
        
        document.getElementById('main-content').addEventListener('submit', async function(e) {
            if (e.target.id === 'lead-form') {
                e.preventDefault();
                const name = document.getElementById('lead-name').value;
                const email = document.getElementById('lead-email').value;
                const message = document.getElementById('lead-message').value;
                const date = document.getElementById('lead-date').value;
                const time = document.getElementById('lead-time').value;

                try {
                    const { error } = await supabase.from('leads').insert([{ 
                        name, 
                        email, 
                        message, 
                        preferred_contact_date: date || null,
                        preferred_contact_time: time || null
                    }]);
                    if (error) throw error;
                    alert('¡Gracias! Tu mensaje ha sido enviado.');
                    e.target.reset();
                } catch(error) {
                    console.error('Error submitting form:', error);
                    alert('Hubo un error al enviar tu mensaje. Por favor, inténtalo de nuevo.');
                }
            }
        });

        function prepareStyleChange(moduleId, styleProperty, newValue) {
            const originalModule = allContent.find(m => m.id == moduleId);
            if (!pendingChanges[moduleId]) { pendingChanges[moduleId] = {}; }
            if (!pendingChanges[moduleId].styles) {
                pendingChanges[moduleId].styles = JSON.parse(JSON.stringify(originalModule.styles || {}));
            }
            pendingChanges[moduleId].styles[styleProperty] = newValue;

            adminControls.saveButton.classList.remove('bg-green-500');
            adminControls.saveButton.classList.add('bg-orange-500');
            adminControls.saveButton.textContent = "Guardar Cambios*";
        }

        document.getElementById('main-content').addEventListener('input', (e) => {
            if (!isAdminMode) return;
            const target = e.target;
            const moduleId = target.dataset.moduleId;

            if (target.classList.contains('bg-color-picker-input')) {
                const newColor = target.value;
                target.closest('section').style.background = newColor;
                prepareStyleChange(moduleId, 'background_color', newColor);
            }
            if (target.classList.contains('text-color-picker-input')) {
                const newColor = target.value;
                target.closest('section').querySelector('.module-content-wrapper').style.color = newColor;
                prepareStyleChange(moduleId, 'text_color', newColor);
            }
        });

        async function uploadImage(file, folder) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;
            const filePath = `${folder}/${fileName}`;

            const { error: uploadError } = await supabase.storage.from('page_images').upload(filePath, file);
            if (uploadError) throw uploadError;

            const { data: urlData } = supabase.storage.from('page_images').getPublicUrl(filePath);
            return urlData.publicUrl;
        }

        document.querySelector('body').addEventListener('click', (e) => {
            const changeBtn = e.target.closest('.change-image-btn');
            if (isAdminMode && changeBtn) {
                changeBtn.nextElementSibling.click();
            }
        });

        document.querySelector('body').addEventListener('change', async (e) => {
            if (!isAdminMode) return;
            const target = e.target;
            
            if (!target.files || target.files.length === 0) {
                return;
            }
            const file = target.files[0];

            if (target.classList.contains('image-file-input')) {
                const button = e.target.previousElementSibling;
                const { moduleId, key, index, prop } = button.dataset;

                const originalBtnContent = button.innerHTML;
                button.innerHTML = `<span>Subiendo...</span>`;
                button.disabled = true;

                try {
                    const publicURL = await uploadImage(file, 'content_images');
                    
                    const moduleToUpdate = allContent.find(m => m.id == moduleId);
                    const newContent = JSON.parse(JSON.stringify(moduleToUpdate.content));

                    if (index !== undefined && prop) {
                        newContent[key][index][prop] = publicURL;
                    } else {
                        newContent[key] = publicURL;
                    }

                    const { error } = await supabase.from('page_content').update({ content: newContent }).eq('id', moduleId);
                    if (error) throw error;

                    await fetchAndRenderPage();
                    setElementsEditable(isAdminMode);
                    alert('Imagen actualizada con éxito!');
                } catch (error) {
                    console.error('Image upload failed:', error);
                    alert('Error al subir la imagen.');
                } finally {
                    // El botón se reconstruirá en el re-render, no es necesario restaurar el contenido.
                }
            }
            
            if (target.classList.contains('bg-image-picker-input')) {
                 const moduleId = target.dataset.moduleId;
                 try {
                    const publicURL = await uploadImage(file, 'backgrounds');
                    const section = document.getElementById(allContent.find(m => m.id == moduleId).section_key);
                    section.style.backgroundImage = `url('${publicURL}')`;
                    prepareStyleChange(moduleId, 'background_image_url', publicURL);
                 } catch(error) {
                    console.error('Background image upload failed:', error);
                    alert('Error al subir la imagen de fondo.');
                 }
            }
        });


        // ===== LÓGICA DE ADMINISTRACIÓN =====
        const adminControls = { /* ... controles ... */ };
        adminControls.loginButton = document.getElementById('admin-login-button');
        adminControls.modeToggleButton = document.getElementById('admin-mode-toggle');
        adminControls.saveButton = document.getElementById('save-changes-button');
        adminControls.logoutButton = document.getElementById('logout-button');
        adminControls.loginModal = document.getElementById('login-modal');
        adminControls.closeLoginModal = document.getElementById('close-login-modal');
        adminControls.loginForm = document.getElementById('login-form');
        adminControls.loginError = document.getElementById('login-error');
        adminControls.adminActiveButtons = document.getElementById('admin-active-buttons');
        adminControls.paletteButton = document.getElementById('palette-button');
        adminControls.paletteModal = document.getElementById('palette-modal');
        adminControls.closePaletteModal = document.getElementById('close-palette-modal');
        adminControls.paletteModalList = document.getElementById('palette-modal-list');
        adminControls.modulesButton = document.getElementById('modules-button');
        adminControls.modulesModal = document.getElementById('modules-modal');
        adminControls.closeModulesModal = document.getElementById('close-modules-modal');
        adminControls.moduleList = document.getElementById('module-list');
        adminControls.saveModulesButton = document.getElementById('save-modules-button');

        adminControls.loginButton.addEventListener('click', () => adminControls.loginModal.classList.remove('hidden'));
        adminControls.closeLoginModal.addEventListener('click', () => adminControls.loginModal.classList.add('hidden'));

        adminControls.loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            adminControls.loginError.textContent = '';
            const { error } = await supabase.auth.signInWithPassword({
                email: e.target.email.value, password: e.target.password.value
            });
            if (error) { adminControls.loginError.textContent = 'Email o contraseña incorrectos.'; } 
            else { adminControls.loginModal.classList.add('hidden'); }
        });

        adminControls.logoutButton.addEventListener('click', async () => { await supabase.auth.signOut(); });

        adminControls.modeToggleButton.addEventListener('click', () => {
            isAdminMode = !isAdminMode;
            document.body.classList.toggle('admin-mode-active', isAdminMode);
            adminControls.saveButton.classList.toggle('hidden', !isAdminMode);
            setElementsEditable(isAdminMode);
            adminControls.modeToggleButton.textContent = isAdminMode ? 'Salir del Modo Admin' : 'Modo Administrador';
        });

        const prepareContentChange = (moduleId, key, value, lang, index, prop) => {
            if (!pendingChanges[moduleId]) {
                const original = allContent.find(m => m.id == moduleId);
                pendingChanges[moduleId] = { content: JSON.parse(JSON.stringify(original.content)) };
            } else if (!pendingChanges[moduleId].content) {
                const original = allContent.find(m => m.id == moduleId);
                pendingChanges[moduleId].content = JSON.parse(JSON.stringify(original.content));
            }

            if (index !== undefined && prop) {
                pendingChanges[moduleId].content[key][index][prop][lang] = value;
            } else {
                pendingChanges[moduleId].content[key][lang] = value;
            }

            adminControls.saveButton.classList.remove('bg-green-500');
            adminControls.saveButton.classList.add('bg-orange-500');
            adminControls.saveButton.textContent = "Guardar Cambios*";
        };

        document.querySelector('body').addEventListener('blur', (e) => {
            if (isAdminMode && e.target.dataset.editable) {
                prepareContentChange(e.target.dataset.moduleId, e.target.dataset.key, e.target.innerText, currentLang, e.target.dataset.index, e.target.dataset.prop);
            }
        }, true);

        adminControls.saveButton.addEventListener('click', async () => {
            if (Object.keys(pendingChanges).length === 0) {
                alert("No hay cambios para guardar.");
                return;
            }
            adminControls.saveButton.textContent = "Guardando...";
            adminControls.saveButton.disabled = true;

            const updatePromises = Object.keys(pendingChanges).map(moduleId => {
                const payload = {};
                const originalModule = allContent.find(m => m.id == moduleId);
                if (pendingChanges[moduleId].content) { payload.content = pendingChanges[moduleId].content; }
                if (pendingChanges[moduleId].styles) { payload.styles = { ...originalModule.styles, ...pendingChanges[moduleId].styles }; }
                return supabase.from('page_content').update(payload).eq('id', moduleId);
            });

            try {
                const results = await Promise.all(updatePromises);
                const firstError = results.find(res => res.error);
                if (firstError) throw firstError.error;
                alert("¡Cambios guardados con éxito!");
                pendingChanges = {};
                adminControls.saveButton.classList.remove('bg-orange-500');
                adminControls.saveButton.classList.add('bg-green-500');
                adminControls.saveButton.textContent = "Guardar Cambios";
                fetchAndRenderPage().then(() => setElementsEditable(isAdminMode));
            } catch (error) {
                console.error("Error saving changes:", error);
                alert("Hubo un error al guardar los cambios.");
            } finally {
                 adminControls.saveButton.disabled = false;
            }
        });
        
        // --- Lógica del Modal de Paletas ---
        adminControls.paletteButton.addEventListener('click', () => {
            populatePaletteModal();
            adminControls.paletteModal.classList.remove('hidden');
        });

        adminControls.closePaletteModal.addEventListener('click', () => {
            adminControls.paletteModal.classList.add('hidden');
        });

        function populatePaletteModal() {
            adminControls.paletteModalList.innerHTML = '';
            colorPalettes.palettes.forEach(palette => {
                const button = document.createElement('button');
                button.className = 'w-full text-left p-4 rounded-lg transition-colors';
                button.onclick = () => applyPalette(palette.colors);
                
                const colorPreview = Object.values(palette.colors).slice(0, 5).map(color => 
                    `<div class="w-6 h-6 rounded-full" style="background-color: ${color}"></div>`
                ).join('');

                button.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="font-bold text-lg">${palette.nicheName}</h3>
                            <p class="text-sm text-gray-400">${palette.description}</p>
                        </div>
                        <div class="flex gap-x-2">
                           ${colorPreview}
                        </div>
                    </div>
                `;
                adminControls.paletteModalList.appendChild(button);
            });
        }
        
        function applyPalette(colors) {
            allContent.forEach(module => {
                const isDarkPalette = tinycolor(colors.background).isDark();
                let bgColor, textColor;

                if (['value_prop', 'social_proof'].includes(module.section_key)) {
                    bgColor = colors.surface;
                    textColor = colors.textPrimary;
                } else {
                    bgColor = colors.background;
                    textColor = colors.textPrimary;
                }
                
                prepareStyleChange(module.id, 'background_color', bgColor);
                prepareStyleChange(module.id, 'text_color', textColor);
            });
            
            const tempContent = allContent.map(module => {
                const changes = pendingChanges[module.id];
                return changes ? { ...module, styles: { ...module.styles, ...changes.styles } } : module;
            });
            
            document.getElementById('main-content').innerHTML = '';
            tempContent.forEach(module => {
                if (module.is_visible && module.section_key !== 'navbar') {
                    const moduleElement = renderModule(module);
                    if (moduleElement) document.getElementById('main-content').appendChild(moduleElement);
                }
            });
            setElementsEditable(isAdminMode);
            adminControls.paletteModal.classList.add('hidden');
        }

        // --- Lógica del Modal de Módulos ---
        adminControls.modulesButton.addEventListener('click', () => {
            populateModulesModal();
            adminControls.modulesModal.classList.remove('hidden');
        });

        adminControls.closeModulesModal.addEventListener('click', () => {
            adminControls.modulesModal.classList.add('hidden');
        });
        
        function populateModulesModal() {
            adminControls.moduleList.innerHTML = '';
            const sortedContent = [...allContent].sort((a,b) => a.display_order - b.display_order);
            
            sortedContent.forEach(module => {
                const li = document.createElement('li');
                li.className = 'flex items-center justify-between p-3 bg-gray-800 rounded-md border border-gray-700';
                li.dataset.moduleId = module.id;

                li.innerHTML = `
                    <div class="flex items-center">
                        <svg class="w-5 h-5 text-gray-400 mr-3 cursor-grab" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        <span class="font-semibold">${module.section_key}</span>
                    </div>
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="checkbox" ${module.is_visible ? 'checked' : ''} class="sr-only peer visibility-toggle">
                        <div class="relative w-11 h-6 bg-gray-600 rounded-full peer peer-focus:ring-4 peer-focus:ring-purple-800 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                    </label>
                `;
                adminControls.moduleList.appendChild(li);
            });
            
            new Sortable(adminControls.moduleList, { animation: 150 });
        }
        
        adminControls.saveModulesButton.addEventListener('click', async () => {
             const updates = [];
             adminControls.moduleList.querySelectorAll('li').forEach((li, index) => {
                updates.push({
                    id: li.dataset.moduleId,
                    display_order: index,
                    is_visible: li.querySelector('.visibility-toggle').checked
                });
             });
             
            const updatePromises = updates.map(update =>
                supabase.from('page_content')
                    .update({
                        display_order: update.display_order,
                        is_visible: update.is_visible
                    })
                    .eq('id', update.id)
            );

            try {
                const results = await Promise.all(updatePromises);
                const firstError = results.find(res => res.error);
                if (firstError) throw firstError.error;
                
                alert('¡Módulos actualizados!');
                adminControls.modulesModal.classList.add('hidden');
                fetchAndRenderPage();
             } catch(error) {
                alert('Error al guardar los módulos.');
                console.error("Detailed error:", error);
             }
        });


        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                adminControls.loginButton.classList.add('hidden');
                adminControls.adminActiveButtons.classList.remove('hidden');
                adminControls.adminActiveButtons.classList.add('flex');
            } else {
                adminControls.loginButton.classList.remove('hidden');
                adminControls.adminActiveButtons.classList.add('hidden');
                adminControls.adminActiveButtons.classList.remove('flex');
                if (isAdminMode) {
                    isAdminMode = false;
                    document.body.classList.remove('admin-mode-active');
                    setElementsEditable(false);
                }
            }
        });

        // ===== INICIALIZACIÓN DE LA PÁGINA =====
        document.addEventListener('DOMContentLoaded', () => {
            const tinycolorScript = document.createElement('script');
            tinycolorScript.src = "https://cdn.jsdelivr.net/npm/tinycolor2/dist/tinycolor-min.js";
            tinycolorScript.onload = () => {
                if (checkSupabaseCredentials()) {
                    fetchAndRenderPage();
                }
            };
            document.head.appendChild(tinycolorScript);
        });
    </script>
</body>
</html>
